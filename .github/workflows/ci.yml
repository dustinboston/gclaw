name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Tests
        run: pnpm test
        env:
          TOKEN_ENCRYPTION_KEY: ci-test-key-not-real-just-for-tests

  build:
    name: Build (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: winbox-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: winbox-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: winbox-macos-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: winbox-macos-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: winbox-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile bin/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: winbox
      POSTGRES_PASSWORD: winbox
      POSTGRES_DB: winbox
    ports:
      - "5432:5432"
    volumes:
      - winbox-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winbox"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  winbox-pgdata:

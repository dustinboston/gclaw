services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gclaw
      POSTGRES_PASSWORD: gclaw
      POSTGRES_DB: gclaw
    ports:
      - "5432:5432"
    volumes:
      - gclaw-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  gclaw-pgdata:
